<body>

<div class="container">
<h1>FORTUNE EARNERS</h1>

<h2>Change Password</h2>

<p>
Enter your current password and choose a new password to keep your account secure.
</p>
<form>

<label>Current Password</label>
<input type="password" placeholder="Enter current password" required>

<label>New Password</label>
<input type="password" placeholder="Enter new password" required>

<label>Confirm New Password</label>
<input type="password" placeholder="Confirm new password" required>

<button type="submit">Change Password</button>

</form>
<h2>Password Tips</h2>

<p>
• Use at least 8 characters.<br>
• Include uppercase and lowercase letters.<br>
• Include at least one number.<br>
• Include a special character (e.g. @, #, !, %).
</p>
<a href="profile.html">
    <button>Back to Profile</button>
</a>
