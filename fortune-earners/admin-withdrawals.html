<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>

Withdrawal Center | Fortune Earners Admin

</title>

<link rel="stylesheet"
href="css/style.css">

</head>

<body>

<header class="top-header">

<h1 class="logo">

💳 WITHDRAWAL CENTER

</h1>

</header>

<main class="dashboard-content">

<section class="dashboard-card">

<h2>

Task Withdrawal Management

</h2>

<p>

Review, search, approve, refund or permanently reject withdrawal requests.

</p>

</section>

<!-- ========================= -->
<!-- SEARCH -->
<!-- ========================= -->

<section class="dashboard-card">

<input
type="text"
id="withdrawSearch"
placeholder="🔍 Search by Full Name, Username, User ID or Withdrawal Reference">

</section>

<!-- ========================= -->
<!-- FILTERS -->
<!-- ========================= -->

<section class="dashboard-card">

<div class="dashboard-grid">

<button id="filterAll">

📋 All

</button>

<button id="filterPending">

🟡 Pending

</button>

<button id="filterPaid">

✅ Paid

</button>

<button id="filterRejected">

❌ Rejected

</button>

</div>

</section>

<!-- ========================= -->
<!-- SUMMARY -->
<!-- ========================= -->

<section class="dashboard-card">

<div class="dashboard-grid">

<div>

<strong>Total Requests</strong>

<p id="totalWithdrawals">

0

</p>

</div>

<div>

<strong>Pending</strong>

<p id="pendingWithdrawals">

0

</p>

</div>

<div>

<strong>Paid</strong>

<p id="paidWithdrawals">

0

</p>

</div>

<div>

<strong>Rejected</strong>

<p id="rejectedWithdrawals">

0

</p>

</div>

</div>

</section>

<!-- ========================= -->
<!-- WITHDRAWAL LIST -->
<!-- ========================= -->

<div id="withdrawalContainer">

<p>

Loading withdrawal requests...

</p>

</div>

  <!-- ========================= -->
<!-- ACTION MODAL -->
<!-- ========================= -->

<div id="actionModal" class="modal" style="display:none;">

<div class="dashboard-card">

<h2 id="actionTitle">

Action

</h2>

<p>

Admin Comment (Optional)

</p>

<textarea
id="adminComment"
rows="5"
placeholder="Write a comment (optional)...">

</textarea>

<br><br>

<div class="dashboard-grid">

<button
id="cancelActionBtn"
class="delete-btn">

❌ Cancel

</button>

<button
id="confirmActionBtn"
class="approve-btn">

✅ Confirm

</button>

</div>

</div>

</div>

</main>

<script type="module"
src="js/admin-auth.js">

</script>

<script type="module"
src="js/admin-withdrawals.js">

</script>

</body>

</html>
