<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Email | Fortune Earners</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="container">

    <h1>FORTUNE EARNERS</h1>

    <h2>Verify Your Email</h2>

    <p>
        Your account has been created successfully.
    </p>

    <p>
        We've sent a verification email to your email address.
    </p>
    <p id="userEmail"></p>

    <p>
        Please check your inbox and click the verification link before logging in.
    </p>

    <p>
        If you don't see the email, check your Spam or Junk folder.
    </p>

    <br>

    <button id="resendVerification">
        Resend Verification Email
    </button>
    <p id="countdown"></p>
    <br><br>

<button id="checkVerification">
    I've Verified My Email
</button>

    <br><br>

    <button id="goToLogin">
    Go to Login
</button>

</div>

<script type="module" src="js/verify-email.js"></script>

</body>
</html>
